services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultify-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATA_DIR: /data
      # REQUIRED: generate with: openssl rand -base64 48
      JWT_SECRET: ${JWT_SECRET}
      # Allowed frontend origin (update with your domain)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      # Auto-lock session duration in hours (default 8h)
      SESSION_HOURS: ${SESSION_HOURS:-8}
    volumes:
      - vault_data:/data
    networks:
      - vaultify_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultify-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    networks:
      - vaultify_net
    depends_on:
      backend:
        condition: service_healthy

volumes:
  vault_data:
    driver: local

networks:
  vaultify_net:
    driver: bridge
